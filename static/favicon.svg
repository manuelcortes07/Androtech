<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B8AC4"/>
      <stop offset="100%" style="stop-color:#1a6a9a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g transform="translate(32,32)">
    <!-- Smartphone outline -->
    <rect x="-11" y="-20" width="22" height="40" rx="3" fill="none" stroke="#fff" stroke-width="2.5"/>
    <!-- Screen -->
    <rect x="-8" y="-15" width="16" height="28" rx="1" fill="rgba(255,255,255,0.15)"/>
    <!-- Wrench icon -->
    <g transform="translate(0,0) rotate(-45)">
      <path d="M-2,-12 L2,-12 L2,4 L4,6 L4,10 Q4,12 2,12 L-2,12 Q-4,12 -4,10 L-4,6 L-2,4 Z" fill="#fff" opacity="0.9"/>
    </g>
    <!-- Home button dot -->
    <circle cx="0" cy="16" r="1.5" fill="#fff" opacity="0.6"/>
  </g>
</svg>
