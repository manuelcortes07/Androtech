{% extends "base.html" %}

{% block title %}Pago Exitoso{% endblock %}

{% block content %}

<div class="row justify-content-center py-5">
    <div class="col-lg-6 col-xl-5">
        <div class="at-service-card text-center py-5 px-4">

            <!-- Icono -->
            <div class="mb-4">
                <i class="bi bi-check-circle-fill" style="font-size: 4rem; color: #2B8AC4;"></i>
            </div>

            <!-- Titulo -->
            <h2 class="fw-bold mb-2" style="color: #0F1923;">Pago realizado con exito</h2>

            <!-- Info reparacion -->
            <p class="text-muted mb-2">
                Gracias por tu pago. Tu reparacion ha sido procesada correctamente.
            </p>
            <p class="mb-3">
                <span class="fw-bold" style="color: #2B8AC4; font-size: 1.15rem;">#{{ reparacion_id }}</span>
            </p>

            <!-- Session ID -->
            <p class="text-muted small mb-4">Session: {{ session_id }}</p>

            <!-- Botones -->
            <div class="d-flex flex-column flex-sm-row justify-content-center gap-2">
                <a href="/" class="at-btn-primary">
                    <i class="bi bi-house-fill me-2"></i>Volver al inicio
                </a>
                <a href="/consulta" class="at-btn-outline">
                    <i class="bi bi-search me-2"></i>Consultar reparacion
                </a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
